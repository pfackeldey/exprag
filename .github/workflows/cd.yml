name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - published
  schedule:
    - cron: "34 5 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: Packages-sdist
          path: dist/*
          if-no-files-found: error

  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-13
            target: x86_64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
          sccache: true

      - uses: actions/upload-artifact@v7
        with:
          name: Packages-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/project/exprag/
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: Packages-*
          path: dist
          merge-multiple: true

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - uses: pypa/gh-action-pypi-publish@release/v1
