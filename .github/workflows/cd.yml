name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - published
  schedule:
    - cron: "34 5 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check versions
        run: python tools/check_versions.py

  sdist:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Build sdist
        run: uv build --sdist --out-dir dist

      - uses: actions/upload-artifact@v7
        with:
          name: Packages-sdist
          path: dist/*
          if-no-files-found: error

  wheels:
    needs: [check]
    runs-on: ${{ matrix.os }}
    env:
      CIBW_ARCHS: auto64
      CIBW_BUILD: cp311-*
      CIBW_BEFORE_ALL_LINUX: curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
      CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15
          - windows-latest
          - windows-11-arm

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          output-dir: dist

      - uses: actions/upload-artifact@v7
        with:
          name: Packages-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/project/exprag/
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: Packages-*
          path: dist
          merge-multiple: true

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - uses: pypa/gh-action-pypi-publish@release/v1
